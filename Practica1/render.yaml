# ============================================================
# Render Deployment Configuration — CountryPedia
# ============================================================
# Define las variables de entorno en Render Dashboard:
#   backend: SECRET_KEY, API_KEY, DATABASE_URL, OPENWEATHER_API_KEY
#   frontend: API_BASE (URL del backend en Render, ej: https://backend.onrender.com)

services:
  # --- Backend (Flask + Gunicorn) ---
  - type: web
    name: countrypedia-backend
    runtime: docker
    repo: https://github.com/tu-usuario/tu-repo
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 5000
      - key: HOST
        value: 0.0.0.0
      - key: SECRET_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ORIGEN_PERMITIDO
        value: https://frontend.onrender.com,http://localhost:8080,http://localhost:5000
    healthCheckPath: /
    autoDeploy: true

  # --- Frontend (Nginx) ---
  - type: web
    name: countrypedia-frontend
    runtime: docker
    repo: https://github.com/tu-usuario/tu-repo
    branch: main
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    dockerCommand: nginx -g "daemon off;"
    envVars:
      - key: API_BASE_URL
        value: https://countrypedia-backend.onrender.com
    autoDeploy: true
