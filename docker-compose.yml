services:
  backend:
    build: ./backend
    container_name: practica1-backend
    ports:
      - "8080:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - ORIGEN_PERMITIDO=http://localhost:8080,http://localhost,http://localhost:5000,http://localhost:5173
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - API_BASE_URL=http://localhost:8080
    container_name: practica1-frontend
    ports:
      - "80:80"
    restart: always